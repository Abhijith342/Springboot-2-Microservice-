spring:
  application:
    name: CategoryApplication
  datasource:
    url: jdbc:h2:mem:testdb   # In-memory H2 database
    driverClassName: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console       # Access at http://localhost:8081/h2-console
  jpa:
    hibernate:
      ddl-auto: update        # Auto create/update tables
    show-sql: true            # Show SQL in logs
